  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  </script>

style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:18px;\">\n                <div style=\"display:flex;flex-direction:column;\"><label style=\"font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:#8E8268;font-weight:600;margin-bottom:8px;\">Submarket<\u002Flabel><input value=\"{{ form.submarket }}\" onchange=\"{{ h.submarket }}\" placeholder=\"Submarket name\"><\u002Fdiv>\n                <div style=\"display:flex;flex-direction:column;\"><label style=\"font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:#8E8268;font-weight:600;margin-bottom:8px;\">Traffic / demographics<\u002Flabel><input value=\"{{ form.traffic }}\" onchange=\"{{ h.traffic }}\" placeholder=\"VPD, households, income\"><\u002Fdiv>\n                <div style=\"display:flex;flex-direction:column;grid-column:1/-1;\"><label style=\"font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:#8E8268;font-weight:600;margin-bottom:8px;\">Co-tenants / anchors<\u002Flabel><input value=\"{{ form.coTenants }}\" onchange=\"{{ h.coTenants }}\" placeholder=\"Notable neighbors\"><\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-if>\n\n          <sc-if value=\"{{ isStep7 }}\" hint-placeholder-val=\"{{ false }}\">\n            <div style=\"animation:fadeUp .3s ease;\">\n              <div style=\"font-size:25px;font-weight:800;letter-spacing:-.01em;\">Assets Checklist<\u002Fdiv>\n              <div style=\"color:#6E6E68;margin:5px 0 26px;\">Tap what is ready. Anything left becomes a marketing to-do.<\u002Fdiv>\n              <div style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:12px;\">\n                <sc-for list=\"{{ assetCards }}\" as=\"ac\" hint-placeholder-count=\"7\">\n                  <div onclick=\"{{ ac.toggle }}\" style=\"{{ ac.cardStyle }}\">\n                    <div style=\"{{ ac.boxStyle }}\">{{ ac.mark }}<\u002Fdiv>\n                    <div style=\"{{ ac.labelStyle }}\">{{ ac.label }}<\u002Fdiv>\n                  <\u002Fdiv>\n                <\u002Fsc-for>\n              <\u002Fdiv>\n              <div style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:22px;margin-top:26px;\">\n                <div style=\"display:flex;flex-direction:column;grid-column:1/-1;\"><label style=\"font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:#8E8268;font-weight:600;margin-bottom:8px;\">Marketing recipient email<\u002Flabel><input value=\"{{ form.recipientEmail }}\" onchange=\"{{ h.recipientEmail }}\" placeholder=\"marketing@firm.com\"><\u002Fdiv>\n                <div style=\"display:flex;flex-direction:column;grid-column:1/-1;\"><label style=\"font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:#8E8268;font-weight:600;margin-bottom:8px;\">Notes<\u002Flabel><textarea value=\"{{ form.notes }}\" onchange=\"{{ h.notes }}\" placeholder=\"Anything else marketing should know\"><\u002Ftextarea><\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-if>\n\n        <\u002Fdiv>\n\n        <!-- NAV BUTTONS -->\n        <div style=\"display:flex;justify-content:space-between;align-items:flex-start;gap:14px;margin-top:24px;flex-wrap:wrap;\">\n          <button onclick=\"{{ back }}\" style=\"{{ backStyle }}\">← Back<\u002Fbutton>\n          <div style=\"display:flex;flex-direction:column;align-items:flex-end;gap:10px;\">\n            <sc-if value=\"{{ hasError }}\" hint-placeholder-val=\"{{ false }}\">\n              <div style=\"color:#B4543B;font-size:13px;font-weight:600;max-width:340px;text-align:right;\">{{ errorMsg }}<\u002Fdiv>\n            <\u002Fsc-if>\n            <sc-if value=\"{{ notLastStep }}\" hint-placeholder-val=\"{{ true }}\">\n              <button onclick=\"{{ next }}\" style=\"padding:15px 32px;border-radius:14px;background:#78A167;color:#fff;border:none;font-weight:700;font-size:14px;cursor:pointer;box-shadow:0 8px 20px rgba(120,161,103,.32);\">Next →<\u002Fbutton>\n            <\u002Fsc-if>\n            <sc-if value=\"{{ isLastStep }}\" hint-placeholder-val=\"{{ false }}\">\n              <button onclick=\"{{ generate }}\" style=\"padding:15px 34px;border-radius:14px;background:#22241F;color:#EDECE2;border:none;font-weight:700;font-size:14px;cursor:pointer;box-shadow:0 8px 20px rgba(34,36,31,.25);\">Generate Brief →<\u002Fbutton>\n            <\u002Fsc-if>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <!-- GENERATED BRIEF -->\n    <sc-if value=\"{{ generated }}\" hint-placeholder-val=\"{{ false }}\">\n      <div style=\"animation:fadeUp .3s ease;\">\n        <div style=\"background:#22241F;border-radius:24px;padding:30px 32px;margin-bottom:18px;color:#EDECE2;display:flex;justify-content:space-between;align-items:flex-end;flex-wrap:wrap;gap:18px;\">\n          <div>\n            <div style=\"font-size:11px;letter-spacing:.22em;text-transform:uppercase;color:#AFA183;font-weight:700;margin-bottom:8px;\">Marketing Brief<\u002Fdiv>\n            <div style=\"font-size:30px;font-weight:800;letter-spacing:-.02em;line-height:1.08;\">{{ summary.name }}<\u002Fdiv>\n            <div style=\"font-size:14px;color:#AFA183;margin-top:5px;\">{{ summary.address }}<\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"display:flex;gap:10px;flex-wrap:wrap;\">\n            <button onclick=\"{{ editBrief }}\" style=\"padding:12px 20px;border-radius:12px;background:transparent;border:1px solid rgba(237,236,226,.3);color:#EDECE2;font-weight:600;font-size:13px;cursor:pointer;\">Edit<\u002Fbutton>\n            <button onclick=\"{{ copyBrief }}\" style=\"padding:12px 20px;border-radius:12px;background:transparent;border:1px solid rgba(237,236,226,.3);color:#EDECE2;font-weight:600;font-size:13px;cursor:pointer;\">{{ copyLabel }}<\u002Fbutton>\n            <button onclick=\"{{ sendBrief }}\" style=\"padding:12px 22px;border-radius:12px;background:#78A167;border:none;color:#fff;font-weight:700;font-size:13px;cursor:pointer;\">Send to Marketing<\u002Fbutton>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <div style=\"background:#EFF4EC;border:1.5px solid #78A167;border-radius:20px;padding:26px 28px;margin-bottom:18px;\">\n          <div style=\"font-size:13px;font-weight:800;letter-spacing:.06em;text-transform:uppercase;color:#5C8050;margin-bottom:16px;\">Action Items for Marketing<\u002Fdiv>\n          <div style=\"display:flex;flex-direction:column;gap:13px;\">\n            <sc-for list=\"{{ brief.actions }}\" as=\"act\" hint-placeholder-count=\"4\">\n              <div style=\"display:flex;gap:13px;align-items:flex-start;\">\n                <div style=\"width:24px;height:24px;border-radius:50%;background:#78A167;color:#fff;font-size:12px;font-weight:700;display:flex;align-items:center;justify-content:center;flex:0 0 auto;margin-top:1px;\">{{ act.num }}<\u002Fdiv>\n                <div style=\"font-size:15px;line-height:1.5;color:#22241F;\">{{ act.text }}<\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <sc-for list=\"{{ brief.sections }}\" as=\"sec\" hint-placeholder-count=\"7\">\n          <div style=\"background:#fff;border-radius:20px;box-shadow:0 8px 30px rgba(34,36,31,.06);padding:26px 30px;margin-bottom:16px;\">\n            <div style=\"font-size:17px;font-weight:800;letter-spacing:-.01em;margin-bottom:4px;\">{{ sec.title }}<\u002Fdiv>\n            <div>\n              <sc-for list=\"{{ sec.rows }}\" as=\"row\" hint-placeholder-count=\"4\">\n                <div style=\"display:grid;grid-template-columns:minmax(120px,180px) 1fr;gap:18px;padding:12px 0;border-top:1px solid rgba(34,36,31,.07);\">\n                  <span style=\"font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:#8E8268;font-weight:600;padding-top:2px;\">{{ row.label }}<\u002Fspan>\n                  <span style=\"font-size:15px;color:#22241F;white-space:pre-line;line-height:1.55;\">{{ row.value }}<\u002Fspan>\n                <\u002Fdiv>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n    <\u002Fsc-if>\n\n  <\u002Fdiv>\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;prefillSample&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:false,&quot;tsType&quot;:&quot;boolean&quot;}}\">\nclass Component extends DCLogic {\n  constructor(props) {\n    super(props);\n    this.state = {\n      step: 1,\n      generated: false,\n      copied: false,\n      errors: [],\n      form: (props && props.prefillSample === true) ? this.sampleForm() : this.blankForm(),\n    };\n  }\n\n  sampleForm() {\n    return {\n      propertyName: '4525 Lemmon Avenue',\n      fullAddress: '4525 Lemmon Avenue, Dallas, TX 75219',\n      propertyType: 'Office & Medical',\n      brokers: 'Yosef Drizin; David Holiner',\n      owner: 'Oxford Capital Partners LLC',\n      ownerContact: 'Marcus Webb · 214.555.0188',\n      launchDate: '2026-07-15',\n      totalSF: '29,246',\n      sfRange: '1,037 - 3,684 RSF',\n      yearBuilt: '1984 / renovated 2022',\n      parking: '4.0 / 1,000 SF, surface and covered',\n      zoning: 'PD-193 commercial',\n      ceilingDocks: '10 ft 6 in finished ceilings, no docks',\n      suites: [\n        { suite: '110', floor: '1', sf: '1,037', status: 'Available', rent: '$28.50 NNN' },\n        { suite: '145', floor: '1', sf: '2,150', status: 'Available', rent: '$28.50 NNN' },\n        { suite: '210', floor: '2', sf: '3,684', status: 'Available', rent: '$30.00 NNN' },\n        { suite: '230', floor: '2', sf: '1,920', status: 'LOI Out', rent: '$30.00 NNN' },\n        { suite: '250', floor: '2', sf: '2,400', status: 'Available', rent: '$30.00 NNN' },\n      ],\n      showRate: 'Publish',\n      askingRent: '$28.50 - $30.00 / SF',\n      rentStructure: 'NNN',\n      nnnCam: '$9.75 / SF (2026 est.)',\n      leaseTerm: '5 - 7 years',\n      escalations: '3% annual',\n      tiAllowance: '$35 / SF on a 5-year term',\n      freeRent: '2 months on a 5-year term',\n      availableDate: 'Immediate',\n      commission: '4% to procuring broker, full term',\n      coverHeadline: 'Premier Office and Medical Suites on Lemmon',\n      theSpace: 'Move-in ready suites from 1,037 SF\\nSecond-generation medical buildout in Suite 210\\nFloor-to-ceiling glass, abundant natural light\\nShared conference facility and tenant lounge',\n      buildingFeatures: 'Renovated lobby and common areas, 2022\\nKeycard access with 24/7 security\\nOn-site management and engineering\\nEV charging stations',\n      locationAccess: 'Two minutes to the Dallas North Tollway\\nWalk to Lemmon Avenue dining and retail\\nFive minutes to Love Field',\n      mapLandmarks: 'Love Field, Dallas North Tollway, Highland Park, Oak Lawn',\n      photoStatus: 'Professional photos scheduled, floor plans ready',\n      contactBlock: 'Yosef Drizin · 443.812.5144 · yosef@holiner.com\\nDavid Holiner · 443.812.5145 · david@holiner.com',\n      emailAudience: 'Office and medical tenant rep brokers, DFW',\n      blastHeadline: 'Now Leasing: Office and Medical on Lemmon Avenue',\n      socialAngle: 'A boutique medical-office address minutes from Love Field',\n      handlesHashtags: '@holinercre · #DallasCRE #OfficeSpace #MedicalOffice',\n      portalLoopnet: true,\n      portalCrexi: true,\n      portalCostar: true,\n      portalCatylist: false,\n      portalCompany: true,\n      portalNotes: 'Lead with the Suite 210 second-generation medical buildout.',\n      ownerApproval: false,\n      confidentiality: 'Pricing may be shared publicly. Tenant names stay confidential.',\n      brokerLicense: 'TX #0654321',\n      trecIabs: true,\n      assetFiles: 'drive.holiner.com/4525-lemmon',\n      budgetCap: '$3,500',\n      listingExpiration: '2027-01-31',\n      showingInstructions: '24-hour notice. Contact the listing brokers to schedule.',\n      virtualTour: 'tour.holiner.com/4525-lemmon',\n      submarket: 'Uptown / Oak Lawn',\n      traffic: '38,400 VPD on Lemmon, 96,000 households within 3 miles',\n      coTenants: 'Texas Health Resources, Compass Real Estate, Cava',\n      assetPhotos: false,\n      assetFloorPlans: true,\n      assetSurvey: true,\n      assetExistingFlyer: false,\n      assetAerial: true,\n      assetGallery: false,\n      assetHeadshots: true,\n      recipientEmail: 'marketing@holiner.com',\n      notes: 'Target launch ahead of the Q3 tenant tour season.',\n    };\n  }\n\n  blankForm() {\n    const s = this.sampleForm();\n    const out = {};\n    Object.keys(s).forEach(k => {\n      if (k === 'suites') out[k] = [{ suite: '', floor: '', sf: '', status: 'Available', rent: '' }];\n      else if (typeof s[k] === 'boolean') out[k] = false;\n      else out[k] = '';\n    });\n    out.propertyType = 'Office';\n    out.showRate = 'Publish';\n    out.rentStructure = 'NNN';\n    return out;\n  }\n\n  fmtDate(s) {\n    if (!s) return 'TBD';\n    const parts = String(s).split('-');\n    if (parts.length !== 3) return s;\n    const mo = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'][parseInt(parts[1], 10) - 1];\n    if (!mo) return s;\n    return mo + ' ' + parseInt(parts[2], 10) + ', ' + parts[0];\n  }\n\n  setField(k, v) { this.setState(s => ({ form: { ...s.form, [k]: v } })); }\n  updateSuite(i, k, v) {\n    this.setState(s => {\n      const su = s.form.suites.slice();\n      su[i] = { ...su[i], [k]: v };\n      return { form: { ...s.form, suites: su } };\n    });\n  }\n  addSuite() { this.setState(s => ({ form: { ...s.form, suites: [...s.form.suites, { suite: '', floor: '', sf: '', status: 'Available', rent: '' }] } })); }\n  removeSuite(i) {\n    this.setState(s => {\n      const su = s.form.suites.slice();\n      su.splice(i, 1);\n      return { form: { ...s.form, suites: su } };\n    });\n  }\n\n  generate() {\n    const f = this.state.form;\n    const e = [];\n    if (!String(f.propertyName).trim()) e.push('property name');\n    if (!String(f.fullAddress).trim()) e.push('full address');\n    if (!f.propertyType) e.push('property type');\n    if (!String(f.brokers).trim()) e.push('listing broker');\n    if (!String(f.totalSF).trim()) e.push('total building SF');\n    if (!f.suites.length || !f.suites.some(x => String(x.sf).trim())) e.push('at least one suite');\n    if (e.length) { this.setState({ errors: e }); return; }\n    this.setState({ generated: true, errors: [] });\n    window.scrollTo({ top: 0, behavior: 'smooth' });\n  }\n\n  buildBrief() {\n    const f = this.state.form;\n    const v = x => (x && String(x).trim()) ? x : 'TBD';\n    const fmt = this.fmtDate;\n    const portals = [];\n    if (f.portalLoopnet) portals.push('LoopNet');\n    if (f.portalCrexi) portals.push('Crexi');\n    if (f.portalCostar) portals.push('CoStar');\n    if (f.portalCatylist) portals.push('Catylist');\n    if (f.portalCompany) portals.push('Company site');\n    const portalsStr = portals.length ? portals.join(', ') : 'None selected';\n    const assetDefs = [\n      ['assetPhotos', 'Professional photos'], ['assetFloorPlans', 'Floor plans'], ['assetSurvey', 'Survey'],\n      ['assetExistingFlyer', 'Existing flyer'], ['assetAerial', 'Aerial / map'], ['assetGallery', 'Gallery photos'], ['assetHeadshots', 'Broker headshots'],\n    ];\n    const missing = assetDefs.filter(d => !f[d[0]]).map(d => d[1]);\n    const suiteRows = f.suites.map(s => ({\n      label: 'Suite ' + v(s.suite),\n      value: [v(s.sf) + ' SF', 'Floor ' + v(s.floor), v(s.status), v(s.rent)].join(' · '),\n    }));\n    const rate = f.showRate === 'Withhold' ? 'Withhold. Show \"Call for pricing\".' : 'Publish rate publicly.';\n\n    const sections = [\n      { title: 'Deal Basics', rows: [\n        { label: 'Property', value: v(f.propertyName) },\n        { label: 'Address', value: v(f.fullAddress) },\n        { label: 'Property type', value: v(f.propertyType) },\n        { label: 'Listing brokers', value: v(f.brokers) },\n        { label: 'Owner / landlord', value: v(f.owner) },\n        { label: 'Owner contact', value: v(f.ownerContact) },\n        { label: 'Target launch', value: fmt(f.launchDate) },\n      ]},\n      { title: 'Building & Suites', rows: [\n        { label: 'Total building SF', value: v(f.totalSF) },\n        { label: 'SF range available', value: v(f.sfRange) },\n        { label: 'Year built / reno', value: v(f.yearBuilt) },\n        { label: 'Parking', value: v(f.parking) },\n        { label: 'Zoning', value: v(f.zoning) },\n        { label: 'Ceiling / docks', value: v(f.ceilingDocks) },\n      ].concat(suiteRows) },\n      { title: 'Pricing & Terms', rows: [\n        { label: 'Rate visibility', value: rate },\n        { label: 'Asking rent', value: f.showRate === 'Withhold' ? 'Call for pricing' : v(f.askingRent) },\n        { label: 'Rent structure', value: v(f.rentStructure) },\n        { label: 'NNN / CAM est.', value: v(f.nnnCam) },\n        { label: 'Lease term', value: v(f.leaseTerm) },\n        { label: 'Escalations', value: v(f.escalations) },\n        { label: 'TI allowance', value: v(f.tiAllowance) },\n        { label: 'Free rent', value: v(f.freeRent) },\n        { label: 'Available date', value: v(f.availableDate) },\n        { label: 'Commission', value: v(f.commission) },\n      ]},\n      { title: 'Flyer Content', rows: [\n        { label: 'Cover headline', value: v(f.coverHeadline) },\n        { label: 'The Space', value: v(f.theSpace) },\n        { label: 'Building Features', value: v(f.buildingFeatures) },\n        { label: 'Location & Access', value: v(f.locationAccess) },\n        { label: 'Map landmarks', value: v(f.mapLandmarks) },\n        { label: 'Photo status', value: v(f.photoStatus) },\n        { label: 'Contact block', value: v(f.contactBlock) },\n      ]},\n      { title: 'Marketing Channels', rows: [\n        { label: 'Email audience', value: v(f.emailAudience) },\n        { label: 'Blast headline', value: v(f.blastHeadline) },\n        { label: 'Social angle', value: v(f.socialAngle) },\n        { label: 'Handles / tags', value: v(f.handlesHashtags) },\n        { label: 'Portals', value: portalsStr },\n        { label: 'Portal notes', value: v(f.portalNotes) },\n      ]},\n      { title: 'Approvals & Logistics', rows: [\n        { label: 'Owner approval', value: f.ownerApproval ? 'Approved to publish' : 'Not yet approved' },\n        { label: 'Confidentiality', value: v(f.confidentiality) },\n        { label: 'Broker license #', value: v(f.brokerLicense) },\n        { label: 'TREC IABS', value: f.trecIabs ? 'Required, include IABS and disclaimer' : 'Not required' },\n        { label: 'Asset files', value: v(f.assetFiles) },\n        { label: 'Budget cap', value: v(f.budgetCap) },\n        { label: 'Listing expiration', value: fmt(f.listingExpiration) },\n        { label: 'Showing instructions', value: v(f.showingInstructions) },\n        { label: 'Virtual tour', value: v(f.virtualTour) },\n        { label: 'Submarket', value: v(f.submarket) },\n        { label: 'Traffic / demo', value: v(f.traffic) },\n        { label: 'Co-tenants', value: v(f.coTenants) },\n      ]},\n      { title: 'Assets Checklist', rows: assetDefs.map(d => ({ label: d[1], value: f[d[0]] ? 'Ready' : 'Needed' })).concat([\n        { label: 'Recipient', value: v(f.recipientEmail) },\n        { label: 'Notes', value: v(f.notes) },\n      ]) },\n    ];\n\n    const acts = [];\n    if (f.showRate === 'Withhold') acts.push('Display \"Call for pricing\" on all public materials. Do not publish the rate.');\n    if (f.trecIabs) acts.push('Add the TREC IABS form and broker license ' + v(f.brokerLicense) + ' to the flyer footer and every portal listing.');\n    if (!f.ownerApproval) acts.push('Route this brief to the owner (' + v(f.owner) + ') for written approval before publishing.');\n    if (missing.length) acts.push('Source missing assets: ' + missing.join(', ') + '.');\n    acts.push('Produce the flyer, email blast, and social post, then publish to: ' + portalsStr + '.');\n    if (f.listingExpiration) acts.push('Set a portal takedown reminder for ' + fmt(f.listingExpiration) + '.');\n\n    let text = 'LISTING MARKETING BRIEF\\n' + v(f.propertyName) + '\\n' + v(f.fullAddress) + '\\n';\n    sections.forEach(s => {\n      text += '\\n' + s.title.toUpperCase() + '\\n';\n      s.rows.forEach(r => { text += '  ' + r.label + ': ' + String(r.value).replace(/\\n/g, '; ') + '\\n'; });\n    });\n    text += '\\nACTION ITEMS FOR MARKETING\\n';\n    acts.forEach((a, i) => { text += '  ' + (i + 1) + '. ' + a + '\\n'; });\n\n    return { sections, actions: acts.map((t, i) => ({ num: i + 1, text: t })), text };\n  }\n\n  renderVals() {\n    const f = this.state.form;\n    const step = this.state.step;\n\n    const h = {};\n    Object.keys(f).forEach(k => {\n      if (k !== 'suites' && typeof f[k] !== 'boolean') h[k] = e => this.setField(k, e.target.value);\n    });\n\n    const stepDefs = [\n      { n: 1, label: 'Basics' }, { n: 2, label: 'Building' }, { n: 3, label: 'Pricing' },\n      { n: 4, label: 'Flyer' }, { n: 5, label: 'Channels' }, { n: 6, label: 'Logistics' }, { n: 7, label: 'Assets' },\n    ];\n    const navBase = 'flex:0 0 auto;padding:13px 16px;border-radius:16px;cursor:pointer;transition:all .2s;display:flex;align-items:center;gap:11px;';\n    const steps = stepDefs.map(s => {\n      const cur = s.n === step, done = s.n < step;\n      return {\n        n: s.n, label: s.label,\n        go: () => this.setState({ step: s.n }),\n        badgeText: done ? '\\u2713' : String(s.n),\n        cardStyle: navBase + (cur ? 'background:#78A167;box-shadow:0 8px 20px rgba(120,161,103,.34);' : 'background:#fff;box-shadow:0 2px 10px rgba(34,36,31,.05);'),\n        badgeStyle: 'width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex:0 0 auto;' + (cur ? 'background:rgba(255,255,255,.25);color:#fff
